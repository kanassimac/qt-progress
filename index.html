<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日靈修與速讀進度</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --card-bg: #ffffff;
      --text: #2c2c2c;
      --text-muted: #7a7a7a;
      --accent: #5b7a5e;
      --accent-light: #e8f0e8;
      --accent-dark: #3d5a3f;
      --today-bg: #fffbeb;
      --today-border: #d4a843;
      --border: #e5e2dc;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      color: #fff;
      padding: 28px 20px 22px;
      text-align: center;
    }
    .header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 4px;
    }
    .header .subtitle {
      font-size: 0.78rem;
      opacity: 0.75;
      font-weight: 300;
    }

    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 16px 8px;
      flex-wrap: wrap;
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.82rem;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .nav-btn:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
      background: var(--accent-light);
    }
    .nav-btn:active { transform: scale(0.96); }
    .nav-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .nav-btn.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }
    .nav-btn svg { width: 14px; height: 14px; fill: currentColor; }

    .date-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      padding: 6px 0 10px;
    }

    .table-wrapper { padding: 0 12px 24px; }

    .progress-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .progress-table thead th {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent-dark);
      background: var(--accent-light);
      padding: 12px 10px;
      text-align: left;
      border-bottom: 2px solid var(--accent);
    }
    .progress-table thead th:first-child { padding-left: 16px; }

    .progress-table tbody tr { transition: background 0.15s; }
    .progress-table tbody tr:hover { background: #fafaf7; }
    .progress-table tbody td {
      padding: 11px 10px;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.55;
    }
    .progress-table tbody td:first-child { padding-left: 16px; }
    .progress-table tbody tr:last-child td { border-bottom: none; }

    .date-cell {
      white-space: nowrap;
      font-weight: 500;
      min-width: 90px;
    }
    .date-cell .weekday {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-left: 4px;
      font-weight: 400;
    }

    tr.is-today { background: var(--today-bg) !important; }
    tr.is-today td { border-bottom-color: #f0e6c0; }
    tr.is-today .date-cell { color: var(--today-border); font-weight: 600; }
    tr.is-today .date-cell::before { content: '📖 '; font-size: 0.75rem; }

    .empty-cell {
      color: #ccc;
      font-style: italic;
      font-size: 0.78rem;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .loading .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      text-align: center;
      padding: 40px 20px;
      color: #c44;
      font-size: 0.85rem;
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 1.15rem; letter-spacing: 2px; }
      .progress-table tbody td { font-size: 0.78rem; padding: 9px 7px; }
      .nav-btn { font-size: 0.78rem; padding: 7px 12px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>每日靈修與速讀進度</h1>
    <div class="subtitle">花蓮靈糧堂 ✦ Kanas 牧師</div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" onclick="navigate(-7)">
      <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      前 7 天
    </button>
    <button class="nav-btn primary" onclick="goToday()">今天</button>
    <button class="nav-btn" onclick="navigate(7)">
      後 7 天
      <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </button>
  </div>

  <div class="date-label" id="range-label"></div>

  <div class="table-wrapper">
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div>載入進度中…</div>
      </div>
    </div>
  </div>

  <script>
    // ★★★ 請替換為你的 GAS Web App URL ★★★
    const API_URL = 'https://script.google.com/macros/s/AKfycbwp1TKPNTBa8lrp03Wdm29XaQjD7Bc9fcVvFTplKeNb6NjV_DNr3bLjSMsYbTCqTHpHzA/exec';

    let currentOffset = 0;
    let todayStr = '';

    function getTodayLocal() {
      const now = new Date();
      const tw = new Date(now.getTime() + (now.getTimezoneOffset() + 480) * 60000);
      return [
        tw.getFullYear(),
        String(tw.getMonth() + 1).padStart(2, '0'),
        String(tw.getDate()).padStart(2, '0')
      ].join('-');
    }

    function jsonpFetch(url) {
      return new Promise((resolve, reject) => {
        const cbName = '_qtcb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
        const timeout = setTimeout(() => { cleanup(); reject(new Error('請求逾時')); }, 15000);

        window[cbName] = function(data) {
          clearTimeout(timeout);
          cleanup();
          resolve(data);
        };

        function cleanup() {
          delete window[cbName];
          const s = document.getElementById(cbName);
          if (s) s.remove();
        }

        const script = document.createElement('script');
        script.id = cbName;
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        script.onerror = () => { clearTimeout(timeout); cleanup(); reject(new Error('無法載入 API')); };
        document.body.appendChild(script);
      });
    }

    async function fetchData() {
      const contentEl = document.getElementById('content');
      contentEl.innerHTML = '<div class="loading"><div class="spinner"></div><div>載入進度中…</div></div>';
      todayStr = getTodayLocal();

      try {
        const url = `${API_URL}?start=${todayStr}&offset=${currentOffset}`;
        const json = await jsonpFetch(url);

        if (!json.success) {
          contentEl.innerHTML = `<div class="error-msg">載入失敗：${json.error || '未知錯誤'}</div>`;
          return;
        }
        renderTable(json.data);
      } catch (err) {
        contentEl.innerHTML = `<div class="error-msg">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderTable(rows) {
      if (rows.length > 0) {
        const first = formatDisplayDate(rows[0].date);
        const last = formatDisplayDate(rows[rows.length - 1].date);
        document.getElementById('range-label').textContent = `${first} — ${last}`;
      }

      let html = `
        <table class="progress-table">
          <thead><tr>
            <th>日期</th>
            <th>靈修進度</th>
            <th>速讀進度</th>
          </tr></thead>
          <tbody>`;

      rows.forEach(row => {
        const isToday = row.date === todayStr;
        const cls = isToday ? ' class="is-today"' : '';
        const qt = row.qt ? escapeHtml(row.qt) : '<span class="empty-cell">—</span>';
        const rd = row.read ? escapeHtml(row.read) : '<span class="empty-cell">—</span>';

        html += `<tr${cls}>
          <td class="date-cell">${formatDisplayDate(row.date)}<span class="weekday">${row.weekday}</span></td>
          <td>${qt}</td>
          <td>${rd}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('content').innerHTML = html;
    }

    function navigate(days) { currentOffset += days; fetchData(); }
    function goToday() { currentOffset = 0; fetchData(); }

    function formatDisplayDate(dateStr) {
      const p = dateStr.split('-');
      return `${parseInt(p[1])}/${parseInt(p[2])}`;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }

    fetchData();
  </script>
</body>
</html>
