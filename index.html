<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日靈修與速讀進度</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f0;
      --card-bg: #ffffff;
      --text: #2c2c2c;
      --text-muted: #7a7a7a;
      --accent: #5b7a5e;
      --accent-light: #e8f0e8;
      --accent-dark: #3d5a3f;
      --today-bg: #fffbeb;
      --today-border: #d4a843;
      --border: #e5e2dc;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      color: #fff;
      padding: 24px 20px 18px;
      text-align: center;
    }
    .header h1 {
      font-family: 'Noto Serif TC', serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 3px;
    }

    .view-toggle {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 14px 16px 4px;
    }
    .view-btn {
      padding: 7px 22px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .view-btn:first-child { border-radius: 18px 0 0 18px; }
    .view-btn:last-child { border-radius: 0 18px 18px 0; }
    .view-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px 6px;
      flex-wrap: wrap;
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.8rem;
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent-dark); background: var(--accent-light); }
    .nav-btn:active { transform: scale(0.96); }
    .nav-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .nav-btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    .nav-btn svg { width: 13px; height: 13px; fill: currentColor; }

    .date-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
      padding: 4px 0 8px;
    }

    /* ===== Week Table ===== */
    .table-wrapper { padding: 0 12px 20px; }

    .progress-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .progress-table thead th {
      font-family: 'Noto Serif TC', serif;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent-dark);
      background: var(--accent-light);
      padding: 11px 10px;
      text-align: left;
      border-bottom: 2px solid var(--accent);
    }
    .progress-table thead th:first-child { padding-left: 14px; }
    .progress-table tbody tr { transition: background 0.15s; }
    .progress-table tbody tr:hover { background: #fafaf7; }
    .progress-table tbody td {
      padding: 10px 10px;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }
    .progress-table tbody td:first-child { padding-left: 14px; }
    .progress-table tbody tr:last-child td { border-bottom: none; }

    .date-cell { white-space: nowrap; font-weight: 500; min-width: 80px; }
    .date-cell .weekday { font-size: 0.72rem; color: var(--text-muted); margin-left: 4px; font-weight: 400; }

    tr.is-today { background: var(--today-bg) !important; }
    tr.is-today td { border-bottom-color: #f0e6c0; }
    tr.is-today .date-cell { color: var(--today-border); font-weight: 600; }
    tr.is-today .date-cell::before { content: '📖 '; font-size: 0.72rem; }

    .empty-cell { color: #ccc; font-style: italic; font-size: 0.78rem; }

    /* 手機：章節換行標記 */
    .chapter-br { display: none; }
    @media (max-width: 600px) {
      .chapter-br { display: inline; }
      .chapter-sep { display: none; }
    }

    /* ===== Month Calendar ===== */
    .cal-wrapper { padding: 0 12px 20px; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .cal-header {
      background: var(--accent-light);
      padding: 8px 4px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent-dark);
      font-family: 'Noto Serif TC', serif;
    }
    .cal-cell {
      background: var(--card-bg);
      padding: 6px 5px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background 0.15s;
    }
    .cal-cell:hover { background: #fafaf7; }
    .cal-cell.out-month { background: #f5f3ee; }
    .cal-cell.out-month .cal-day { color: #ccc; }
    .cal-cell.is-today { background: var(--today-bg); }
    .cal-cell.is-today .cal-day { color: var(--today-border); font-weight: 700; }

    .cal-day { font-size: 0.75rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .cal-qt, .cal-read {
      font-size: 0.62rem;
      line-height: 1.35;
      padding: 2px 3px;
      border-radius: 3px;
      word-break: break-all;
    }
    .cal-qt { background: #e8f0e8; color: #3d5a3f; }
    .cal-read { background: #e8ecf4; color: #3a4d6e; }

    .loading {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
      font-size: 0.88rem;
    }
    .loading .spinner {
      display: inline-block;
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { text-align: center; padding: 40px 20px; color: #c44; font-size: 0.85rem; }

    @media (max-width: 480px) {
      .header h1 { font-size: 1.12rem; letter-spacing: 2px; }
      .progress-table tbody td { font-size: 0.78rem; padding: 8px 6px; }
      .nav-btn { font-size: 0.76rem; padding: 6px 11px; }
      .cal-cell { min-height: 58px; padding: 4px 3px; }
      .cal-qt, .cal-read { font-size: 0.58rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>每日靈修與速讀進度</h1>
  </div>

  <div class="view-toggle">
    <button class="view-btn active" id="vbtn-week" onclick="switchView('week')">一週</button>
    <button class="view-btn" id="vbtn-month" onclick="switchView('month')">月曆</button>
  </div>

  <div class="nav-bar" id="nav-bar"></div>
  <div class="date-label" id="range-label"></div>

  <div id="content-area">
    <div class="table-wrapper"><div id="content">
      <div class="loading"><div class="spinner"></div><div>載入進度中…</div></div>
    </div></div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwp1TKPNTBa8lrp03Wdm29XaQjD7Bc9fcVvFTplKeNb6NjV_DNr3bLjSMsYbTCqTHpHzA/exec';

    let currentView = 'week';
    let weekOffset = 0;
    let monthOffset = 0;
    let todayStr = '';
    let isMobile = window.innerWidth <= 600;

    // 監聽視窗變化
    window.addEventListener('resize', () => {
      const wasMobile = isMobile;
      isMobile = window.innerWidth <= 600;
      if (wasMobile !== isMobile && lastData) {
        // 裝置寬度變化時重新渲染（不重新請求）
        if (currentView === 'week') renderWeek(lastData);
      }
    });

    let lastData = null; // 快取最近一次的渲染資料

    // ===== 前端快取 =====
    const localCache = {};
    const CACHE_DURATION = 5 * 60 * 1000;

    function getTodayLocal() {
      const now = new Date();
      const tw = new Date(now.getTime() + (now.getTimezoneOffset() + 480) * 60000);
      return [tw.getFullYear(), String(tw.getMonth() + 1).padStart(2, '0'), String(tw.getDate()).padStart(2, '0')].join('-');
    }

    function jsonpFetch(url) {
      const entry = localCache[url];
      if (entry && (Date.now() - entry.ts < CACHE_DURATION)) {
        return Promise.resolve(entry.data);
      }
      return new Promise((resolve, reject) => {
        const cbName = '_qcb' + Date.now() + Math.floor(Math.random() * 9999);
        const timeout = setTimeout(() => { cleanup(); reject(new Error('請求逾時')); }, 15000);
        window[cbName] = function(data) {
          clearTimeout(timeout); cleanup();
          localCache[url] = { data, ts: Date.now() };
          resolve(data);
        };
        function cleanup() { delete window[cbName]; const s = document.getElementById(cbName); if (s) s.remove(); }
        const script = document.createElement('script');
        script.id = cbName;
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
        script.onerror = () => { clearTimeout(timeout); cleanup(); reject(new Error('無法載入 API')); };
        document.body.appendChild(script);
      });
    }

    // ===== 文字格式化 =====

    /**
     * 靈修進度：手機上在書名與章節之間換行
     * 例：「撒母耳記下11:14-27」→「撒母耳記下<br>11:14-27」
     * 規則：在中文字後緊接數字之間插入換行
     */
    function fmtQt(str) {
      if (!str) return '<span class="empty-cell">—</span>';
      let s = esc(str);
      if (isMobile) {
        // 在中文字元後面緊接的數字前插入 <br>
        s = s.replace(/([\u4e00-\u9fff\u3400-\u4dbf])(\d)/g, '$1<br>$2');
      }
      return s;
    }

    /**
     * 速讀進度：手機上「、」改為換行
     * 例：「約珥書2~3、阿摩司書1~3」→「約珥書2~3<br>阿摩司書1~3」
     */
    function fmtRead(str) {
      if (!str) return '<span class="empty-cell">—</span>';
      let s = esc(str);
      if (isMobile) {
        s = s.replace(/、/g, '<br>');
      }
      return s;
    }

    // ===== View =====
    function switchView(view) {
      currentView = view;
      document.getElementById('vbtn-week').classList.toggle('active', view === 'week');
      document.getElementById('vbtn-month').classList.toggle('active', view === 'month');
      if (view === 'week') weekOffset = 0; else monthOffset = 0;
      renderNav();
      fetchData();
    }

    function renderNav() {
      const nav = document.getElementById('nav-bar');
      const aL = '<svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>';
      const aR = '<svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>';
      if (currentView === 'week') {
        nav.innerHTML = `
          <button class="nav-btn" onclick="navWeek(-7)">${aL} 前 7 天</button>
          <button class="nav-btn primary" onclick="navWeek(0)">今天</button>
          <button class="nav-btn" onclick="navWeek(7)">後 7 天 ${aR}</button>`;
      } else {
        nav.innerHTML = `
          <button class="nav-btn" onclick="navMonth(-1)">${aL} 上個月</button>
          <button class="nav-btn primary" onclick="navMonth(0)">本月</button>
          <button class="nav-btn" onclick="navMonth(1)">下個月 ${aR}</button>`;
      }
    }

    function navWeek(n) { if (n === 0) weekOffset = 0; else weekOffset += n; fetchData(); }
    function navMonth(n) { if (n === 0) monthOffset = 0; else monthOffset += n; fetchData(); }

    // ===== Fetch =====
    async function fetchData() {
      const area = document.getElementById('content-area');
      area.innerHTML = '<div class="table-wrapper"><div class="loading"><div class="spinner"></div><div>載入進度中…</div></div></div>';
      todayStr = getTodayLocal();

      try {
        let url;
        if (currentView === 'week') {
          url = `${API_URL}?start=${todayStr}&offset=${weekOffset}`;
        } else {
          const now = new Date();
          const tw = new Date(now.getTime() + (now.getTimezoneOffset() + 480) * 60000);
          tw.setMonth(tw.getMonth() + monthOffset);
          const ym = tw.getFullYear() + '-' + String(tw.getMonth() + 1).padStart(2, '0');
          url = `${API_URL}?month=${ym}`;
        }

        const json = await jsonpFetch(url);
        if (!json.success) {
          area.innerHTML = `<div class="table-wrapper"><div class="error-msg">載入失敗：${json.error || '未知錯誤'}</div></div>`;
          return;
        }

        if (json.mode === 'month') { lastData = null; renderMonth(json); }
        else { lastData = json.data; renderWeek(json.data); }

      } catch (err) {
        area.innerHTML = `<div class="table-wrapper"><div class="error-msg">${esc(err.message)}</div></div>`;
      }
    }

    // ===== Render Week =====
    function renderWeek(rows) {
      if (rows.length > 0) {
        document.getElementById('range-label').textContent =
          `${fmtDate(rows[0].date)} — ${fmtDate(rows[rows.length - 1].date)}`;
      }

      let html = `<div class="table-wrapper"><table class="progress-table">
        <thead><tr><th>日期</th><th>靈修進度</th><th>速讀進度</th></tr></thead><tbody>`;

      rows.forEach(row => {
        const isToday = row.date === todayStr;
        const cls = isToday ? ' class="is-today"' : '';
        html += `<tr${cls}>
          <td class="date-cell">${fmtDate(row.date)}<span class="weekday">${row.weekday}</span></td>
          <td>${fmtQt(row.qt)}</td>
          <td>${fmtRead(row.read)}</td></tr>`;
      });

      html += '</tbody></table></div>';
      document.getElementById('content-area').innerHTML = html;
    }

    // ===== Render Month =====
    function renderMonth(json) {
      const { year, month, data } = json;
      document.getElementById('range-label').textContent = `${year} 年 ${month} 月`;

      const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
      let html = '<div class="cal-wrapper"><div class="cal-grid">';
      weekdays.forEach(w => { html += `<div class="cal-header">${w}</div>`; });

      data.forEach(cell => {
        const classes = ['cal-cell'];
        if (!cell.inMonth) classes.push('out-month');
        if (cell.date === todayStr) classes.push('is-today');

        let inner = `<div class="cal-day">${cell.day}</div>`;
        if (cell.qt) inner += `<div class="cal-qt">${esc(cell.qt)}</div>`;
        if (cell.read) inner += `<div class="cal-read">${esc(cell.read)}</div>`;

        html += `<div class="${classes.join(' ')}">${inner}</div>`;
      });

      html += '</div></div>';
      document.getElementById('content-area').innerHTML = html;
    }

    // ===== Utils =====
    function fmtDate(s) { const p = s.split('-'); return `${parseInt(p[1])}/${parseInt(p[2])}`; }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

    // ===== Init =====
    todayStr = getTodayLocal();
    renderNav();
    fetchData();
  </script>
</body>
</html>
