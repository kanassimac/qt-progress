<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; padding: 12px 16px; line-height: 1.8; color: #333; font-size: 16px; }
    .container { width: 100%; max-width: 100%; margin: auto; box-sizing: border-box; }
    select { width: 100%; padding: 12px; border: 1.5px solid #0044bb; border-radius: 8px; font-size: 16px; margin-bottom: 25px; background: #f9f9ff; box-sizing: border-box; }
    .main-title { color: #5b4dbd; text-align: center; font-size: 1.25rem; font-weight: bold; margin-bottom: 20px; }
    .section-header { color: #0000ff; font-weight: bold; text-align: center; margin: 30px 0 10px; font-size: 1.1rem; }
    .section-header::before, .section-header::after { content: " － "; }
    .content-box { white-space: pre-wrap; margin-bottom: 25px; text-align: justify; font-size: 1rem; line-height: 1.9; }
    .sharing-title { color: #6B46C1; font-weight: bold; font-size: 1.1rem; text-align: center; display: block; margin: 5px 0 0 0; }
    #loading { text-align: center; margin-top: 100px; color: #888; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <select id="datePicker" onchange="load(this.value)"></select>
    <div id="loading">讀取中...</div>
    <div id="contentArea" class="hidden">
      <h1 id="title" class="main-title"></h1>

      <!-- 舊格式區塊（撒母耳記下）-->
      <div id="old-blocks">
        <div class="section-header">讀經</div><div id="read" class="content-box"></div>
        <div class="section-header">經文摘要</div><div id="summary" class="content-box"></div>
        <div class="section-header">從經文來認識神的屬性</div><div id="attr" class="content-box" style="font-weight:bold;"></div>
        <div class="section-header">靈修分享</div><div id="sharing" class="content-box"></div>
        <div class="section-header">禱告</div><div id="prayer" class="content-box"></div>
      </div>

      <!-- 新格式區塊（羅馬書）-->
      <div id="new-blocks" class="hidden">
        <div class="section-header">今日經文</div><div id="n-read" class="content-box"></div>
        <div class="section-header">停在這裡</div><div id="n-pause" class="content-box"></div>
        <div class="section-header">靠近一點</div><div id="n-closer" class="content-box"></div>
        <div class="section-header">留給你的</div><div id="n-leave" class="content-box"></div>
      </div>
    </div>
  </div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycby4Escc36efiMcLjHEl0visU84pYBsHNky4SI8pBJ2Y34og5wViIVT6IOY5mD0S5LXi/exec';

    function load(d) {
      document.getElementById('contentArea').classList.add('hidden');
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('loading').innerText = '讀取中...';

      var old = document.getElementById('jsonp-script');
      if (old) old.parentNode.removeChild(old);

      window._gasCallback = function(res) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('contentArea').classList.remove('hidden');

        var picker = document.getElementById('datePicker');
        if (picker.options.length === 0) {
          res.dateList.forEach(function(item) {
            var opt = document.createElement('option');
            opt.value = item.val; opt.text = item.label;
            if (item.val === res.currentDate) opt.selected = true;
            picker.appendChild(opt);
          });
        }

        if (res.content) {
          document.getElementById('title').innerText = res.content.title;

          if (res.isNewFormat) {
            document.getElementById('old-blocks').classList.add('hidden');
            document.getElementById('new-blocks').classList.remove('hidden');
            document.getElementById('n-read').innerText    = res.content.col3 || '';
            document.getElementById('n-pause').innerText   = res.content.col4 || '';
            document.getElementById('n-closer').innerText  = res.content.col6 || '';
            document.getElementById('n-leave').innerText   = res.content.col7 || '';
          } else {
            document.getElementById('new-blocks').classList.add('hidden');
            document.getElementById('old-blocks').classList.remove('hidden');
            document.getElementById('read').innerText    = res.content.col3 || '';
            document.getElementById('summary').innerText = res.content.col4 || '';
            document.getElementById('attr').innerText    = res.content.col5 || '';
            document.getElementById('sharing').innerHTML = formatSharing(res.content.col6);
            document.getElementById('prayer').innerText  = res.content.col7 || '';
          }
        }
      };

      var url = GAS_URL
        + '?action=getData'
        + (d ? '&date=' + encodeURIComponent(d) : '')
        + '&callback=_gasCallback';

      var script = document.createElement('script');
      script.id = 'jsonp-script';
      script.src = url;
      script.onerror = function() {
        document.getElementById('loading').innerText = '讀取失敗，請重新整理。';
      };
      document.head.appendChild(script);
    }

    function formatSharing(text) {
      if (!text) return "";
      return text.trim().replace(/#.*/, function(match) {
        return '<span class="sharing-title">' + match + '</span>';
      }).replace(/<\/span>\s*\n+/, '</span>');
    }

    window.onload = function() { load(null); };
  </script>
</body>
</html>
